<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Stay - StayEase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900">
    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>

    <main class="pt-32 pb-24 max-w-5xl mx-auto px-4">
        <div id="loading" class="text-center py-24">
            <div class="w-12 h-12 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-zinc-500">Loading booking details...</p>
        </div>

        <div id="booking-content" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-12">
            <div class="lg:col-span-2">
                <h1 class="text-3xl font-bold mb-8">Complete Your Booking</h1>
                
                <form id="booking-form" class="space-y-8">
                    <section class="bg-white p-8 rounded-3xl border border-black/5 shadow-sm">
                        <h2 class="text-xl font-bold mb-6 flex items-center gap-2"><i data-lucide="user" class="w-5 h-5"></i> Personal Details</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-zinc-700 mb-2">Full Name</label>
                                <input required type="text" id="user-name" class="w-full px-4 py-3 rounded-xl border border-zinc-200 focus:ring-2 focus:ring-emerald-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-zinc-700 mb-2">Email Address</label>
                                <input required type="email" id="user-email" class="w-full px-4 py-3 rounded-xl border border-zinc-200 focus:ring-2 focus:ring-emerald-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-zinc-700 mb-2">Check-in Date</label>
                                <input required type="date" id="check-in" class="w-full px-4 py-3 rounded-xl border border-zinc-200 focus:ring-2 focus:ring-emerald-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-zinc-700 mb-2">Phone Number</label>
                                <input required type="tel" id="user-phone" placeholder="+91 00000 00000" class="w-full px-4 py-3 rounded-xl border border-zinc-200 focus:ring-2 focus:ring-emerald-500 outline-none">
                            </div>
                        </div>
                    </section>

                    <button type="submit" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold text-lg hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-100">
                        Pay & Confirm Booking
                    </button>
                </form>
            </div>

            <div class="lg:col-span-1">
                <div class="sticky top-32 bg-zinc-900 text-white p-8 rounded-3xl shadow-xl">
                    <h2 class="text-xl font-bold mb-6">Order Summary</h2>
                    <div id="summary-items" class="space-y-4 mb-8">
                        <!-- Summary items injected here -->
                    </div>
                    <div class="border-t border-white/10 pt-4 flex justify-between items-end">
                        <div>
                            <p class="text-sm text-zinc-400">Total Amount (Pro-rated)</p>
                            <p class="text-3xl font-bold" id="total-price">₹0</p>
                        </div>
                    </div>
                    <div class="mt-8 flex items-center gap-2 text-xs text-zinc-500">
                        <i data-lucide="credit-card" class="w-3.5 h-3.5"></i> Secure Payment via Stripe
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/book.js"></script>
</body>
</html>
