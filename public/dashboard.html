<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPG - StayEase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .dashboard-bg {
            background: linear-gradient(135deg, #f5f9f7, #eafaf1);
            min-height: 100vh;
        }
    </style>
</head>
<body class="dashboard-bg text-zinc-900">
    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>

    <main class="pt-32 pb-24 max-w-4xl mx-auto px-4">
        <h1 class="text-3xl font-bold mb-8 tracking-tight">MyPG</h1>
        
        <div class="bg-white p-8 rounded-3xl border border-black/5 shadow-sm mb-12">
            <p class="text-sm text-zinc-500 mb-4">Enter your email to view your bookings</p>
            <div class="flex flex-col sm:flex-row gap-4">
                <input 
                    type="email" 
                    id="dashboard-email"
                    class="flex-1 px-4 py-3 rounded-xl border border-zinc-200 outline-none focus:ring-2 focus:ring-emerald-500"
                    placeholder="your@email.com"
                >
                <button 
                    id="fetch-bookings-btn"
                    class="px-8 py-3 bg-zinc-900 text-white rounded-xl font-bold hover:bg-zinc-800 transition-all"
                >
                    View Bookings
                </button>
            </div>
        </div>

        <div id="bookings-list" class="space-y-6">
            <!-- Bookings injected here -->
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
