<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Rooms - StayEase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .rooms-bg {
            background: linear-gradient(135deg, #f0fff4, #e6f9f0);
            background-image: radial-gradient(circle at 10% 10%, #d4fcf0 0%, transparent 40%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="rooms-bg text-zinc-900">
    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>

    <main class="pt-32 pb-24 max-w-7xl mx-auto px-4">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
            <div>
                <h1 class="text-4xl font-bold mb-4 tracking-tight">Available Rooms</h1>
                <p class="text-zinc-500">Choose the space that fits your lifestyle</p>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
                <div class="relative flex-1 sm:w-64">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400 w-4 h-4"></i>
                    <input 
                        type="text" 
                        id="search-input"
                        placeholder="Search rooms..." 
                        class="w-full pl-10 pr-4 py-3 bg-white border border-zinc-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all"
                    >
                </div>
                
                <div class="bg-white border border-zinc-200 rounded-2xl p-3 flex items-center gap-4 flex-1 sm:w-64">
                    <i data-lucide="sliders-horizontal" class="text-zinc-400 w-4 h-4"></i>
                    <div class="flex-1">
                        <div class="flex justify-between text-[10px] font-bold text-zinc-400 uppercase mb-1">
                            <span>Max Price</span>
                            <span id="price-display">₹20000</span>
                        </div>
                        <input 
                            type="range" 
                            id="price-range"
                            min="0" 
                            max="20000" 
                            step="500"
                            class="w-full h-1.5 bg-zinc-100 rounded-lg appearance-none cursor-pointer accent-emerald-600"
                            value="20000"
                        >
                    </div>
                </div>
            </div>
        </div>

        <div id="rooms-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Rooms will be injected here -->
            <div class="col-span-full text-center py-24">
                <div class="w-12 h-12 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-zinc-500">Loading rooms...</p>
            </div>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/rooms.js"></script>
</body>
</html>
