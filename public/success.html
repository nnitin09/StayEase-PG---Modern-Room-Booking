<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed - StayEase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900">
    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>

    <main class="pt-32 pb-24 max-w-md mx-auto px-4 text-center">
        <div id="loading" class="py-24">
            <div class="w-12 h-12 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-zinc-500">Confirming your booking...</p>
        </div>

        <div id="success-content" class="hidden">
            <div class="w-24 h-24 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-8 shadow-lg shadow-emerald-100">
                <i data-lucide="check-circle-2" class="w-12 h-12"></i>
            </div>
            <h1 class="text-4xl font-bold mb-4 tracking-tight">Booking Confirmed!</h1>
            <p class="text-zinc-500 mb-10 leading-relaxed">
                Your payment was successful and your room is reserved. We've sent the confirmation details to your email.
            </p>
            <div class="space-y-4">
                <a href="/dashboard.html" class="block w-full py-4 bg-zinc-900 text-white rounded-2xl font-bold hover:bg-zinc-800 transition-all">
                    View MyPG
                </a>
                <a href="/" class="block w-full py-4 bg-zinc-100 text-zinc-600 rounded-2xl font-bold hover:bg-zinc-200 transition-all">
                    Back to Home
                </a>
            </div>
        </div>

        <div id="error-content" class="hidden">
            <div class="w-24 h-24 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-8 shadow-lg shadow-red-100">
                <i data-lucide="x-circle" class="w-12 h-12"></i>
            </div>
            <h1 class="text-3xl font-bold mb-4 tracking-tight">Something went wrong</h1>
            <p id="error-msg" class="text-zinc-500 mb-10 leading-relaxed"></p>
            <a href="/dashboard.html" class="block w-full py-4 bg-zinc-900 text-white rounded-2xl font-bold hover:bg-zinc-800 transition-all">
                Go to Dashboard
            </a>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/success.js"></script>
</body>
</html>
